<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Conduence — Knowledge Graph</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #f8fafc;
    color: #1e293b;
    font-family: Inter, system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: 48px;
    background: #ffffff;
    border-bottom: 1px solid #e2e8f0;
    flex-shrink: 0;
  }
  .topbar__brand { display: flex; align-items: center; gap: 10px; }
  .topbar__dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #16a34a;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .topbar__name { font-size: 13px; font-weight: 600; letter-spacing: .02em; color: #1e293b; }
  .topbar__meta { font-size: 11px; color: #64748b; margin-left: 8px; }

  .btn-back {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px;
    border: 1px solid #cbd5e1;
    border-radius: 6px;
    background: transparent;
    color: #475569;
    font: inherit; font-size: 12px;
    cursor: pointer;
    text-decoration: none;
    transition: background .15s, color .15s, border-color .15s;
  }
  .btn-back:hover { background: #f1f5f9; color: #1e293b; border-color: #2563eb; }

  /* ── layout ── */
  .graph-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .graph-body {
    flex: 1;
    display: flex;
    position: relative;
    overflow: hidden;
  }
  .graph-canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #ffffff;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: grab;
  }

  /* ── graph-user pill ── */
  .graph-user {
    display: flex; align-items: center; gap: 8px;
    font-size: 11px; color: #64748b;
  }
  .graph-user__name  { color: #2563eb; }
  .graph-user__email { color: #94a3b8; }

  /* ── detail panel ── */
  .detail-panel {
    width: 280px;
    border-left: 1px solid #e2e8f0;
    background: #f8fafc;
    overflow-y: auto;
    padding: 16px;
    font-size: 12px;
  }
  .detail-panel__close {
    position: absolute; top: 10px; right: 10px;
    background: none; border: none; color: #94a3b8;
    cursor: pointer; padding: 4px;
  }
  .detail-panel__close:hover { color: #1e293b; }

  /* ── legend ── */
  .graph-legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 8px 16px;
    background: #ffffff;
    border-top: 1px solid #e2e8f0;
  }
  .graph-legend__item {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; color: #64748b;
  }
  .graph-legend__dot {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }

  /* ── detail panel styles ── */
  :root {
    --text-dim: #475569;
    --border:   #e2e8f0;
  }
  .dp-type-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .dp-name  { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 2px; }
  .dp-uuid  { font-size: 10px; color: #94a3b8; margin-bottom: 12px; word-break: break-all; }
  .dp-rel-label { font-size: 14px; font-weight: 600; color: #0f172a; margin-bottom: 4px; }
  .dp-arrow { font-size: 11px; color: #64748b; margin-bottom: 10px; }
  .dp-section { margin-top: 12px; }
  .dp-section-title {
    font-size: 10px; font-weight: 600; letter-spacing: .08em;
    text-transform: uppercase; color: #94a3b8; margin-bottom: 6px;
  }
  .dp-summary { font-size: 12px; color: #475569; line-height: 1.5; }
  .dp-prop-row { display: flex; gap: 8px; padding: 3px 0; border-bottom: 1px solid #e2e8f0; }
  .dp-prop-key { flex: 0 0 90px; font-size: 10px; color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .dp-prop-val { flex: 1; font-size: 11px; color: #475569; word-break: break-word; }
  .dp-edge-item {
    padding: 6px 8px; margin-bottom: 4px;
    background: #ffffff; border: 1px solid #e2e8f0; border-radius: 5px;
    cursor: pointer;
  }
  .dp-edge-item:hover { border-color: #bfdbfe; background: #eff6ff; }
  .dp-edge-name { font-size: 11px; font-weight: 600; color: #475569; margin-bottom: 2px; }
  .dp-edge-fact { font-size: 10px; color: #64748b; }
</style>
</head>
<body data-config-ready="{{ 'true' if config_ready else 'false' }}" data-graph-theme="light">

<div class="graph-shell">

  <header class="topbar">
    <div class="topbar__brand">
      <span class="topbar__dot"></span>
      <span class="topbar__name">Knowledge Graph</span>
      <span class="topbar__meta" id="graph-meta">0 nodes · 0 edges</span>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <div class="graph-user" id="graph-bar-user" hidden>
        <span class="graph-user__name"  id="graph-user-name"></span>
        <span class="graph-user__email" id="graph-user-email"></span>
      </div>
      <a class="btn-back" href="/">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
        Voice
      </a>
    </div>
  </header>

  <div class="graph-body">
    <div class="graph-canvas-wrap" id="graph-canvas-wrap">
      <canvas id="graph-canvas" aria-label="Knowledge graph"></canvas>
    </div>

    <aside class="detail-panel" id="detail-panel" hidden style="position:relative">
      <button class="detail-panel__close" id="detail-panel-close" aria-label="Close">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="detail-panel__content" id="detail-panel-content"></div>
    </aside>
  </div>

  <div class="graph-legend" id="graph-legend"></div>

</div>

<script>
// Expose the user info section on load
document.addEventListener("DOMContentLoaded", async () => {
  try {
    const r = await fetch("/api/user");
    if (!r.ok) return;
    const u = await r.json();
    const el = document.getElementById("graph-bar-user");
    if (u.first_name || u.last_name) {
      document.getElementById("graph-user-name").textContent  = [u.first_name, u.last_name].filter(Boolean).join(" ");
      document.getElementById("graph-user-email").textContent = u.email || "";
      el.hidden = false;
    }
  } catch {}
});
</script>
<script src="/static/graph.js"></script>
</body>
</html>
